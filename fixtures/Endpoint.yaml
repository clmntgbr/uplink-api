App\Domain\Endpoint\Entity\Endpoint:
  endpoint_{1..10000}:
    name: "<sentence(3, true)>"
    project: "@project_*"
    baseUri: "https://api.example.com"
    path: "/<slug()>"
    method: "<randomElement(['GET', 'POST', 'PUT', 'DELETE', 'PATCH'])>"
    header:
      Content-Type: "application/json"
    body:
      name: "<firstName()>"
      email: "<email()>"
    query:
      id: "<uuid()>"
    response:
      name: "<firstName()>"
      email: "<email()>"
      token: "<uuid()>"
      expiresAt: "<dateTimeBetween('now', '+1 hour')>"
      refreshToken: "<uuid()>"
      refreshExpiresAt: "<dateTimeBetween('now', '+1 day')>"
    timeoutSeconds: "<numberBetween(1, 30)>"

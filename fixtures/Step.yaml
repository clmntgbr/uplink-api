App\Domain\Step\Entity\Step:
  step_{1..10000}:
    endpoint: "@endpoint_*"
    workflow: "@workflow_*"
    position: "<numberBetween(1, 10000)>"
    response:
      name: "<firstName()>"
      email: "<email()>"
      token: "<uuid()>"
      expiresAt: "<dateTimeBetween('now', '+1 hour')>"
      refreshToken: "<uuid()>"
      refreshExpiresAt: "<dateTimeBetween('now', '+1 day')>"
    query:
      id: "<uuid()>"
    body:
      name: "isString"
      email: "isEmail"
    header:
      Content-Type: "application/json"